name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── ホストユニットテスト ────────────────────────────────────────────────
  host-test:
    name: Host unit tests (g++)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: clean test files
        run: make -C test clean
      - name: Build & run
        run: make -C test run

  # ── ファジングテスト ────────────────────────────────────────────────────
  fuzz-test:
    name: Fuzz testing
    runs-on: ubuntu-latest
    needs: host-test
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Run fuzz test
        run: make -C test fuzz FUZZ_ITERATIONS=100000

  # ── Arduino Lint ─────────────────────────────────────────────────────────
  arduino-lint:
    name: Arduino Lint
    runs-on: ubuntu-latest
    needs: host-test
    steps:
      - uses: actions/checkout@v6
      - name: Run Arduino Lint
        uses: arduino/arduino-lint-action@v2
        with:
          library-manager: submit
          compliance: strict

  # ── Arduino (ESP32-C3) コンパイルチェック ─────────────────────────────
  arduino-compile:
    name: arduino-cli compile (ESP32-C3)
    runs-on: ubuntu-latest
    needs:
      - host-test
      - arduino-lint
    steps:
      - uses: actions/checkout@v6

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2
        with:
          version: "1.x"

      - name: Install ESP32 core
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Compile examples
        run: |
          LIB_DIR=$(arduino-cli config get directories.user)/libraries
          mkdir -p "$LIB_DIR"
          ln -s "$GITHUB_WORKSPACE" "$LIB_DIR/azaraC"
          BOARD=esp32:esp32:esp32c3
          for sketch in examples/*/; do
            echo "--- $sketch ---"
            arduino-cli compile --fqbn $BOARD "$sketch"
          done
